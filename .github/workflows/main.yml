name: Python CI/CD Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install pytest
        run: pip install pytest

      # Step 4: Run tests
      - name: Run tests
        run: pytest

      # Step 5: Deploy ONLY if everything passed
      - name: Deploy Application
        if: success()
        run: echo "🚀 Deployment successful!"
